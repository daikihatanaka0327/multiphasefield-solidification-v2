# =====================================================
# Multi-Phase Field Solidification - Configuration
# =====================================================

grid:
  nx: 256
  ny: 256
  dx: 1.0e-4
  dy: 1.0e-4
  dt: 1.0e-4
  nsteps: 20000

physical:
  T_melt: 1687          # Melting temperature [K]
  G: 1.0e+2             # Temperature gradient [K/m]
  V_pulling: 1.0e-2     # Pulling velocity [m/s]
  Sf: 2.12e+4           # Entropy of fusion [J/(m3*K)]

interface:

  delta_factor: 6.0     # Interface thickness = delta_factor * dx
  gamma_100: 0.44       # Solid-liquid base energy (100 baseline) [J/m2]
  gamma_GB: 0.60        # Grain boundary energy (isotropic) [J/m2]

anisotropy:
  a0_deg: 54.7          # Reference angle [degrees]
  delta_a: 0.36         # Anisotropy strength
  mu_a: 0.6156          # Anisotropy prefactor
  p_round: 0.05         # Corner rounding parameter
  ksi: 0.30             # Kinetic anisotropy parameter
  omg_deg: 10.0         # Angular parameter [degrees^-1]

mobility:
  M_SL: 5.0e-5          # Solid-liquid mobility [m/(Pa*s)]
  M_GB_ratio: 0.075      # M_GB = M_SL * M_GB_ratio important

gpu:
  MAX_GRAINS: 20        # Max phases in kernel (fixed buffer size)
  KMAX: 18              # Max active phases buffer size
  threads_per_block: [16, 16]

seed:
  mode: "image_line"    # "random_110" or "image_line"
  number_of_grain_fallback: 17  # Used only when mode = "random_110"
  random_seed: 42       # Random seed for "random_110" mode
  image_path: "D:/hatanaka/phasefield/generated/seed0064_encode_XZ_111.bmp"
  line_axis: "horizontal"   # "horizontal" or "vertical"
  line_index: null          # null = center line
  color_tolerance: 0        # 0..255, tolerance for anti-aliased images
  height: 32                # Initial solid seed height [grid points]

output:
  dir_template: "result/new/{M_GB_ratio:.2f}/{cooling_rate:.1e}"
  save_every: 200

# ---------------------------------------------------------------
# Validation modes (used by run_singlemode.py / run_twomode.py)
# ---------------------------------------------------------------

singlemode:
  seed_height: 32              # Initial solid front height [grid points]
  orientation_type: "euler"    # "euler" or "quaternion"
  euler_deg: [0.0, 0.0, 0.0]  # Euler angles [deg], rotation order "xyz"
  # quaternion: [0.0, 0.0, 0.0, 1.0]   # Alternative: direct (x,y,z,w)

twomode:
  seed_height: 32              # Base solid front height [grid points]
  split_ratio: 0.5             # Grain1 / Grain2 split (fraction of nx)
  grain1_seed_offset: 0        # Extra height for grain 1 front [grid pts]
  grain2_seed_offset: 0        # Extra height for grain 2 front [grid pts]

  grain1:
    orientation_type: "euler"
    euler_deg: [0.0, 0.0, 0.0]

  grain2:
    orientation_type: "euler"
    euler_deg: [0.0, 45.0, 0.0]

# ---------------------------------------------------------------
# randommode (used by run_randommode.py)
# ---------------------------------------------------------------

randommode:
  seed_height: 32              # Initial solid front height [grid points]
  n_solid: 10                  # Number of solid grains (number_of_grain = n_solid + 1)
  random_seed: 42              # Voronoi seed-point placement RNG seed
  orientation_mode: "random"   # "random" or "file"
  orientation_seed: 42         # RNG seed for quaternion generation (mode=random)
  orientation_csv: ""          # Path to CSV (used if orientation_mode = "file")

# ---------------------------------------------------------------
# imagemode (used by run_imagemode.py)
# ---------------------------------------------------------------

imagemode:
  seed_height: 32              # Initial solid front height [grid points]
  image_path: "D:/hatanaka/phasefield/generated/seed0064_encode_XZ_111.bmp"               # Path to grain-map image (BMP, PNG, TIFF, ...)
  orientation_mode: "rgb"   # "random", "file", or "rgb"
  orientation_seed: 42         # RNG seed (used if orientation_mode = "random")
  orientation_csv: ""          # Path to CSV (used if orientation_mode = "file")
